<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PortraitPay AI - 控制台</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --primary: #0066CC;
            --primary-dark: #004499;
            --secondary: #86868b;
            --bg: #000000;
            --bg-secondary: #1d1d1f;
            --card: #2d2d2f;
            --text: #f5f5f7;
            --text-secondary: #86868b;
            --accent: #2997ff;
            --success: #30d158;
            --warning: #ff9f0a;
            --danger: #ff453a;
            --gradient: linear-gradient(135deg, #2997ff 0%, #0066CC 100%);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
        }
        
        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 240px;
            height: 100vh;
            background: var(--bg-secondary);
            padding: 20px 0;
            border-right: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
        }
        
        .logo {
            padding: 0 24px 24px;
            font-size: 24px;
            font-weight: 700;
            color: var(--text);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }
        
        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 24px;
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
        }
        
        .menu-item:hover {
            background: rgba(255,255,255,0.05);
            color: var(--text);
        }
        
        .menu-item.active {
            background: rgba(41, 151, 255, 0.15);
            color: var(--accent);
            border-right: 3px solid var(--accent);
        }
        
        .menu-icon { font-size: 20px; }
        
        /* Main Content */
        .main {
            margin-left: 240px;
            padding: 24px 32px;
            min-height: 100vh;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }
        
        .page-title {
            font-size: 32px;
            font-weight: 700;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .balance {
            background: var(--card);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
        }
        
        .balance span { color: var(--success); font-weight: 600; }
        
        .btn {
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: var(--accent);
            color: white;
        }
        
        .btn-primary:hover { background: #0077ed; transform: scale(1.02); }
        
        .btn-outline {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
        }
        
        .btn-outline:hover { background: rgba(41, 151, 255, 0.1); }
        
        .btn-danger {
            background: var(--danger);
            color: white;
        }
        
        .btn-danger:hover { background: #ff6b61; }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        
        .stat-card {
            background: var(--card);
            border-radius: 16px;
            padding: 24px;
            transition: transform 0.2s;
        }
        
        .stat-card:hover { transform: translateY(-4px); }
        
        .stat-icon {
            font-size: 32px;
            margin-bottom: 12px;
        }
        
        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: var(--text);
        }
        
        .stat-label {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        
        /* Cards */
        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .card-title {
            font-size: 18px;
            font-weight: 600;
        }
        
        /* Tables */
        .table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .table th, .table td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .table th {
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 13px;
            text-transform: uppercase;
        }
        
        .table tr:hover td {
            background: rgba(255,255,255,0.03);
        }
        
        .tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
        }
        
        .tag-success { background: rgba(48, 209, 88, 0.2); color: var(--success); }
        .tag-warning { background: rgba(255, 159, 10, 0.2); color: var(--warning); }
        .tag-primary { background: rgba(41, 151, 255, 0.2); color: var(--accent); }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        
        .empty-icon { font-size: 64px; margin-bottom: 16px; }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .modal.active { display: flex; }
        
        .modal-content {
            background: var(--card);
            border-radius: 20px;
            width: 100%;
            max-width: 500px;
            padding: 32px;
            animation: modalIn 0.3s ease;
        }
        
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .modal-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 24px;
        }
        
        .form-group { margin-bottom: 16px; }
        
        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 14px;
            background: var(--bg-secondary);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: var(--text);
            font-size: 15px;
        }
        
        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        .form-textarea { min-height: 100px; resize: vertical; }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-secondary);
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(255,255,255,0.95);
            color: #000;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            z-index: 3000;
            opacity: 0;
            transition: all 0.3s;
        }
        
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        
        /* Tabs */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 12px;
        }
        
        .tab {
            padding: 10px 20px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 14px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        
        .tab:hover { background: rgba(255,255,255,0.05); }
        
        .tab.active {
            background: var(--accent);
            color: white;
        }
        
        /* History Timeline */
        .timeline {
            position: relative;
            padding-left: 30px;
        }
        
        .timeline::before {
            content: '';
            position: absolute;
            left: 8px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: rgba(255,255,255,0.1);
        }
        
        .timeline-item {
            position: relative;
            padding-bottom: 24px;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .timeline-dot {
            position: absolute;
            left: -26px;
            top: 4px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--accent);
        }
        
        .timeline-content {
            background: var(--bg-secondary);
            padding: 16px;
            border-radius: 12px;
        }
        
        .timeline-time {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        
        .timeline-title {
            font-weight: 500;
            margin-bottom: 4px;
        }
        
        .timeline-desc {
            font-size: 13px;
            color: var(--text-secondary);
        }
        
        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 24px;
        }
        
        .page-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: var(--bg-secondary);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .page-btn:hover, .page-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main { margin-left: 0; padding: 16px; }
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="logo">PortraitPay AI</div>
        
        <a class="menu-item active" onclick="showPage('dashboard')">
            <span class="menu-icon">📊</span> 仪表盘
        </a>
        <a class="menu-item" onclick="showPage('faces')">
            <span class="menu-icon">👤</span> 人脸库
        </a>
        <a class="menu-item" onclick="showPage('works')">
            <span class="menu-icon">🎨</span> 我的作品
        </a>
        <a class="menu-item" onclick="showPage('history')">
            <span class="menu-icon">📜</span> 监测历史
        </a>
        <a class="menu-item" onclick="showPage('stats')">
            <span class="menu-icon">📈</span> 数据统计
        </a>
        <a class="menu-item" onclick="showPage('settings')">
            <span class="menu-icon">⚙️</span> 设置
        </a>
        <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1);">
            <a class="menu-item" onclick="logout()">
                <span class="menu-icon">🚪</span> 退出登录
            </a>
        </div>
    </aside>
    
    <!-- Main Content -->
    <main class="main">
        <!-- Header -->
        <div class="header">
            <h1 class="page-title" id="pageTitle">仪表盘</h1>
            <div class="user-info">
                <div class="balance">余额: <span id="userBalance">¥0</span></div>
                <button class="btn btn-primary" onclick="openModal('upload')">+ 上传肖像</button>
            </div>
        </div>
        
        <!-- Dashboard Page -->
        <div id="page-dashboard">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">👤</div>
                    <div class="stat-value" id="totalFaces">0</div>
                    <div class="stat-label">已上传肖像</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🎨</div>
                    <div class="stat-value" id="totalWorks">0</div>
                    <div class="stat-label">作品数量</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📊</div>
                    <div class="stat-value" id="totalUsage">0</div>
                    <div class="stat-label">调用次数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">💰</div>
                    <div class="stat-value" id="totalEarnings">¥0</div>
                    <div class="stat-label">累计收益</div>
                </div>
            </div>
            
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">最近活动</h3>
                </div>
                <div class="timeline" id="recentActivity">
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <p>暂无活动记录</p>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Faces Page -->
        <div id="page-faces" style="display: none;">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">人脸库管理</h3>
                    <button class="btn btn-primary" onclick="openModal('uploadFace')">+ 添加人脸</button>
                </div>
                <div id="facesList">
                    <div class="empty-state">
                        <div class="empty-icon">👤</div>
                        <p>暂无人脸数据</p>
                        <button class="btn btn-primary" style="margin-top: 16px;" onclick="openModal('uploadFace')">添加人脸</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Works Page -->
        <div id="page-works" style="display: none;">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">作品管理</h3>
                    <button class="btn btn-primary" onclick="openModal('uploadWork')">+ 添加作品</button>
                </div>
                <div id="worksList">
                    <div class="empty-state">
                        <div class="empty-icon">🎨</div>
                        <p>暂无作品</p>
                        <button class="btn btn-primary" style="margin-top: 16px;" onclick="openModal('uploadWork')">添加作品</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- History Page -->
        <div id="page-history">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">监测历史</h3>
                    <div style="display: flex; gap: 12px;">
                        <select class="form-select" style="width: auto;" id="historyFilter">
                            <option value="all">全部类型</option>
                            <option value="face">人脸查询</option>
                            <option value="work">作品查询</option>
                            <option value="upload">上传记录</option>
                        </select>
                    </div>
                </div>
                <div class="timeline" id="historyList">
                    <div class="empty-state">
                        <div class="empty-icon">📜</div>
                        <p>暂无监测历史</p>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Stats Page -->
        <div id="page-stats" style="display: none;">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">📊</div>
                    <div class="stat-value" id="statTotalFaces">0</div>
                    <div class="stat-label">人脸总数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🎨</div>
                    <div class="stat-value" id="statTotalWorks">0</div>
                    <div class="stat-label">作品总数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🔗</div>
                    <div class="stat-value" id="statTotalCalls">0</div>
                    <div class="stat-label">API调用</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">💵</div>
                    <div class="stat-value" id="statPlatformRevenue">¥0</div>
                    <div class="stat-label">平台收入</div>
                </div>
            </div>
            
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">收益趋势（7天）</h3>
                </div>
                <div style="padding: 20px;">
                    <canvas id="revenueChart" height="200"></canvas>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">收益明细</h3>
                </div>
                <div style="overflow-x: auto;">
                    <table style="width: 100%; border-collapse: collapse;">
                        <thead>
                            <tr style="border-bottom: 1px solid var(--bg-secondary);">
                                <th style="padding: 12px; text-align: left; color: var(--text-secondary); font-size: 12px;">日期</th>
                                <th style="padding: 12px; text-align: left; color: var(--text-secondary); font-size: 12px;">人脸</th>
                                <th style="padding: 12px; text-align: left; color: var(--text-secondary); font-size: 12px;">用途</th>
                                <th style="padding: 12px; text-align: right; color: var(--text-secondary); font-size: 12px;">收益</th>
                                <th style="padding: 12px; text-align: center; color: var(--text-secondary); font-size: 12px;">状态</th>
                            </tr>
                        </thead>
                        <tbody id="transactionList">
                            <tr>
                                <td colspan="5" style="padding: 40px; text-align: center; color: var(--text-secondary);">
                                    暂无收益记录
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <!-- Settings Page -->
        <div id="page-settings" style="display: none;">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">账户设置</h3>
                </div>
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input type="text" class="form-input" id="settingsUsername" readonly>
                </div>
                <div class="form-group">
                    <label class="form-label">API Key</label>
                    <input type="text" class="form-input" id="settingsApiKey" readonly style="font-family: monospace;">
                </div>
                <button class="btn btn-primary" onclick="copyApiKey()">复制 API Key</button>
            </div>
            
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">充值</h3>
                </div>
                <div class="form-group">
                    <label class="form-label">充值金额</label>
                    <input type="number" class="form-input" id="depositAmount" placeholder="输入金额">
                </div>
                <button class="btn btn-primary" onclick="handleDeposit()">立即充值</button>
            </div>
        </div>
    </main>
    
    <!-- Upload Face Modal -->
    <div class="modal" id="uploadFaceModal">
        <div class="modal-content">
            <h2 class="modal-title">添加人脸</h2>
            <form onsubmit="return handleUploadFace(event)">
                <div class="form-group">
                    <label class="form-label">姓名</label>
                    <input type="text" class="form-input" id="faceName" required>
                </div>
                <div class="form-group">
                    <label class="form-label">描述</label>
                    <textarea class="form-textarea" id="faceDesc" placeholder="描述此肖像"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">是否为公众人物</label>
                    <select class="form-select" id="faceCelebrity">
                        <option value="0">普通用户</option>
                        <option value="1">公众人物</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">价格 (元/次调用)</label>
                    <input type="number" class="form-input" id="facePrice" value="0" min="0" step="0.01">
                </div>
                <div class="form-group">
                    <label class="form-label">版权信息</label>
                    <input type="text" class="form-input" id="faceCopyright" placeholder="版权声明">
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="faceDeclaration" required>
                        我确认内容非AI生成
                    </label>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">提交</button>
                <button type="button" class="btn btn-outline" style="width: 100%; margin-top: 12px;" onclick="closeModal('uploadFace')">取消</button>
            </form>
        </div>
    </div>
    
    <!-- Upload Work Modal -->
    <div class="modal" id="uploadWorkModal">
        <div class="modal-content">
            <h2 class="modal-title">添加作品</h2>
            <form onsubmit="return handleUploadWork(event)">
                <div class="form-group">
                    <label class="form-label">标题</label>
                    <input type="text" class="form-input" id="workTitle" required>
                </div>
                <div class="form-group">
                    <label class="form-label">描述</label>
                    <textarea class="form-textarea" id="workDesc" placeholder="作品描述"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">作品类型</label>
                    <select class="form-select" id="workType">
                        <option value="image">图片</option>
                        <option value="video">视频</option>
                        <option value="audio">音频</option>
                        <option value="text">文字</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">作者</label>
                    <input type="text" class="form-input" id="workAuthor" required>
                </div>
                <div class="form-group">
                    <label class="form-label">价格 (元)</label>
                    <input type="number" class="form-input" id="workPrice" value="0" min="0" step="0.01">
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="workDeclaration" required>
                        我确认内容非AI生成
                    </label>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">提交</button>
                <button type="button" class="btn btn-outline" style="width: 100%; margin-top: 12px;" onclick="closeModal('uploadWork')">取消</button>
            </form>
        </div>
    </div>
    
    <!-- Toast -->
    <div class="toast" id="toast"></div>
    
    <script>
        const API = window.location.hostname === 'localhost' ? 'http://127.0.0.1:5000/api' : 'https://web-production-2757f.up.railway.app/api';
        let token = localStorage.getItem('portrait_token') || '';
        let username = localStorage.getItem('portrait_user') || '';
        
        // Check auth
        if (!token) {
            alert('请先登录');
            window.location.href = 'index.html';
        }
        
        // Show page
        function showPage(page) {
            document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
            event.target.closest('.menu-item').classList.add('active');
            
            document.querySelectorAll('[id^="page-"]').forEach(p => p.style.display = 'none');
            document.getElementById('page-' + page).style.display = 'block';
            
            const titles = {
                dashboard: '仪表盘',
                faces: '人脸库',
                works: '我的作品',
                history: '监测历史',
                stats: '数据统计',
                settings: '设置'
            };
            document.getElementById('pageTitle').textContent = titles[page];
            
            // Load data
            if (page === 'dashboard') loadDashboard();
            if (page === 'faces') loadFaces();
            if (page === 'works') loadWorks();
            if (page === 'history') loadHistory();
            if (page === 'stats') loadStats();
            if (page === 'settings') loadSettings();
        }
        
        // Load dashboard
        let revenueChart = null;
        
        async function loadDashboard() {
            try {
                const res = await fetch(`${API}/my`, {
                    headers: {'X-API-Key': token}
                });
                const d = await res.json();
                
                document.getElementById('totalFaces').textContent = d.faces?.length || 0;
                document.getElementById('totalWorks').textContent = d.works?.length || 0;
                
                let usage = 0;
                d.faces?.forEach(f => usage += f.usage_count || 0);
                d.works?.forEach(w => usage += w.usage_count || 0);
                document.getElementById('totalUsage').textContent = usage;
                document.getElementById('totalEarnings').textContent = '¥' + (d.earnings || 0);
                
                document.getElementById('userBalance').textContent = '¥' + (d.balance || 0);
                
                // Load revenue chart
                loadRevenueChart();
                
                // Load transaction history
                loadTransactionHistory();
            } catch(e) {
                console.error(e);
            }
        }
        
        async function loadRevenueChart() {
            try {
                const res = await fetch(`${API}/history?chart=true`, {
                    headers: {'X-API-Key': token}
                });
                const d = await res.json();
                
                // Generate last 7 days labels
                const labels = [];
                const data = [];
                for (let i = 6; i >= 0; i--) {
                    const date = new Date();
                    date.setDate(date.getDate() - i);
                    labels.push(date.toLocaleDateString('zh-CN', {month:'short', day:'numeric'}));
                    // Find matching data or 0
                    const dayStr = date.toISOString().split('T')[0];
                    const dayData = d.find(r => r.date === dayStr);
                    data.push(dayData ? dayData.amount : 0);
                }
                
                const ctx = document.getElementById('revenueChart').getContext('2d');
                if (revenueChart) revenueChart.destroy();
                revenueChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: '日收益 (¥)',
                            data: data,
                            borderColor: '#30d158',
                            backgroundColor: 'rgba(48, 209, 88, 0.1)',
                            fill: true,
                            tension: 0.4,
                            pointRadius: 4,
                            pointBackgroundColor: '#30d158'
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: { display: false }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                grid: { color: 'rgba(255,255,255,0.1)' },
                                ticks: { color: '#86868b' }
                            },
                            x: {
                                grid: { display: false },
                                ticks: { color: '#86868b' }
                            }
                        }
                    }
                });
            } catch(e) {
                console.error('Chart error:', e);
            }
        }
        
        async function loadTransactionHistory() {
            try {
                const res = await fetch(`${API}/history?limit=20`, {
                    headers: {'X-API-Key': token}
                });
                const d = await res.json();
                const history = d.history || [];
                
                const tbody = document.getElementById('transactionList');
                if (!history.length) {
                    tbody.innerHTML = `<tr><td colspan="5" style="padding: 40px; text-align: center; color: var(--text-secondary);">暂无收益记录</td></tr>`;
                    return;
                }
                
                tbody.innerHTML = history.map(r => `
                    <tr style="border-bottom: 1px solid var(--bg-secondary);">
                        <td style="padding: 12px; font-size: 13px;">${new Date(r.timestamp).toLocaleDateString('zh-CN')}</td>
                        <td style="padding: 12px; font-size: 13px;">${r.target_name || '肖像'}</td>
                        <td style="padding: 12px; font-size: 13px; color: var(--text-secondary);">${r.usage_type || 'AI调用'}</td>
                        <td style="padding: 12px; font-size: 13px; text-align: right; color: var(--success);">+¥${r.amount_paid || 0}</td>
                        <td style="padding: 12px; text-align: center;"><span style="background: rgba(48,209,88,0.2); color: var(--success); padding: 4px 8px; border-radius: 12px; font-size: 11px;">${r.status || '已结算'}</span></td>
                    </tr>
                `).join('');
            } catch(e) {
                console.error('Transaction history error:', e);
            }
        }
        
        // Load faces
        async function loadFaces() {
            try {
                const res = await fetch(`${API}/my`, {
                    headers: {'X-API-Key': token}
                });
                const d = await res.json();
                const faces = d.faces || [];
                
                if (!faces.length) {
                    document.getElementById('facesList').innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">👤</div>
                            <p>暂无人脸数据</p>
                            <button class="btn btn-primary" style="margin-top: 16px;" onclick="openModal('uploadFace')">添加人脸</button>
                        </div>`;
                    return;
                }
                
                document.getElementById('facesList').innerHTML = `
                    <table class="table">
                        <thead>
                            <tr>
                                <th>姓名</th>
                                <th>类型</th>
                                <th>价格</th>
                                <th>调用次数</th>
                                <th>状态</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${faces.map(f => `
                                <tr>
                                    <td>${f.name}</td>
                                    <td>${f.is_celebrity ? '<span class="tag tag-warning">公众人物</span>' : '<span class="tag tag-primary">普通</span>'}</td>
                                    <td>¥${f.original_price || 0}</td>
                                    <td>${f.usage_count || 0}</td>
                                    <td><span class="tag tag-success">${f.status}</span></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>`;
            } catch(e) {
                console.error(e);
            }
        }
        
        // Load works
        async function loadWorks() {
            try {
                const res = await fetch(`${API}/my`, {
                    headers: {'X-API-Key': token}
                });
                const d = await res.json();
                const works = d.works || [];
                
                if (!works.length) {
                    document.getElementById('worksList').innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">🎨</div>
                            <p>暂无作品</p>
                            <button class="btn btn-primary" style="margin-top: 16px;" onclick="openModal('uploadWork')">添加作品</button>
                        </div>`;
                    return;
                }
                
                document.getElementById('worksList').innerHTML = `
                    <table class="table">
                        <thead>
                            <tr>
                                <th>标题</th>
                                <th>类型</th>
                                <th>作者</th>
                                <th>价格</th>
                                <th>调用次数</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${works.map(w => `
                                <tr>
                                    <td>${w.title}</td>
                                    <td>${w.work_type}</td>
                                    <td>${w.author_name}</td>
                                    <td>¥${w.original_price || 0}</td>
                                    <td>${w.usage_count || 0}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>`;
            } catch(e) {
                console.error(e);
            }
        }
        
        // Load history
        async function loadHistory() {
            try {
                const res = await fetch(`${API}/my`, {
                    headers: {'X-API-Key': token}
                });
                const d = await res.json();
                
                const activities = [];
                d.faces?.forEach(f => {
                    if (f.usage_count > 0) {
                        activities.push({
                            type: 'face',
                            title: '人脸被查询',
                            desc: `${f.name} 被查询 ${f.usage_count} 次`,
                            time: f.created_at
                        });
                    }
                });
                d.works?.forEach(w => {
                    if (w.usage_count > 0) {
                        activities.push({
                            type: 'work',
                            title: '作品被查看',
                            desc: `${w.title} 被查看 ${w.usage_count} 次`,
                            time: w.created_at
                        });
                    }
                });
                
                if (!activities.length) {
                    document.getElementById('historyList').innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">📜</div>
                            <p>暂无监测历史</p>
                        </div>`;
                    return;
                }
                
                activities.sort((a, b) => new Date(b.time) - new Date(a.time));
                
                document.getElementById('historyList').innerHTML = activities.map(a => `
                    <div class="timeline-item">
                        <div class="timeline-dot"></div>
                        <div class="timeline-content">
                            <div class="timeline-time">${new Date(a.time).toLocaleString()}</div>
                            <div class="timeline-title">${a.title}</div>
                            <div class="timeline-desc">${a.desc}</div>
                        </div>
                    </div>
                `).join('');
            } catch(e) {
                console.error(e);
            }
        }
        
        // Load stats
        async function loadStats() {
            try {
                const res = await fetch(`${API}/stats`);
                const d = await res.json();
                
                document.getElementById('statTotalFaces').textContent = d.faces || 0;
                document.getElementById('statTotalWorks').textContent = d.works || 0;
                document.getElementById('statTotalCalls').textContent = d.uses || 0;
                document.getElementById('statPlatformRevenue').textContent = '¥' + (d.platform_revenue || 0);
            } catch(e) {
                console.error(e);
            }
        }
        
        // Load settings
        async function loadSettings() {
            document.getElementById('settingsUsername').value = username;
            document.getElementById('settingsApiKey').value = token;
            
            try {
                const res = await fetch(`${API}/balance`, {
                    headers: {'X-API-Key': token}
                });
                const d = await res.json();
                document.getElementById('userBalance').textContent = '¥' + (d.balance || 0);
            } catch(e) {}
        }
        
        // Modal
        function openModal(id) {
            document.getElementById(id + 'Modal').classList.add('active');
        }
        
        function closeModal(id) {
            document.getElementById(id + 'Modal').classList.remove('active');
        }
        
        // Toast
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }
        
        // Upload face
        async function handleUploadFace(e) {
            e.preventDefault();
            const data = {
                name: document.getElementById('faceName').value,
                description: document.getElementById('faceDesc').value,
                is_celebrity: parseInt(document.getElementById('faceCelebrity').value),
                price: parseFloat(document.getElementById('facePrice').value) || 0,
                copyright_info: document.getElementById('faceCopyright').value,
                ai_declaration: 1
            };
            
            try {
                const res = await fetch(`${API}/faces`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-API-Key': token
                    },
                    body: JSON.stringify(data)
                });
                const d = await res.json();
                
                if (d.success) {
                    showToast('人脸上传成功！');
                    closeModal('uploadFace');
                    loadFaces();
                } else {
                    showToast(d.error || '上传失败');
                }
            } catch(e) {
                showToast('网络错误');
            }
            return false;
        }
        
        // Upload work
        async function handleUploadWork(e) {
            e.preventDefault();
            const data = {
                title: document.getElementById('workTitle').value,
                description: document.getElementById('workDesc').value,
                work_type: document.getElementById('workType').value,
                author_name: document.getElementById('workAuthor').value,
                price: parseFloat(document.getElementById('workPrice').value) || 0,
                ai_declaration: 1
            };
            
            try {
                const res = await fetch(`${API}/works`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-API-Key': token
                    },
                    body: JSON.stringify(data)
                });
                const d = await res.json();
                
                if (d.success) {
                    showToast('作品上传成功！');
                    closeModal('uploadWork');
                    loadWorks();
                } else {
                    showToast(d.error || '上传失败');
                }
            } catch(e) {
                showToast('网络错误');
            }
            return false;
        }
        
        // Deposit
        async function handleDeposit() {
            const amount = parseFloat(document.getElementById('depositAmount').value);
            if (!amount || amount <= 0) {
                showToast('请输入有效金额');
                return;
            }
            
            try {
                const res = await fetch(`${API}/deposit`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-API-Key': token
                    },
                    body: JSON.stringify({amount})
                });
                const d = await res.json();
                
                if (d.success) {
                    showToast('充值成功！');
                    document.getElementById('depositAmount').value = '';
                    loadDashboard();
                } else {
                    showToast(d.error || '充值失败');
                }
            } catch(e) {
                showToast('网络错误');
            }
        }
        
        // Copy API key
        function copyApiKey() {
            const key = document.getElementById('settingsApiKey').value;
            navigator.clipboard.writeText(key);
            showToast('API Key 已复制');
        }
        
        // Logout
        function logout() {
            localStorage.removeItem('portrait_token');
            localStorage.removeItem('portrait_user');
            window.location.href = 'index.html';
        }
        
        // Init
        loadDashboard();
    </script>
</body>
</html>
