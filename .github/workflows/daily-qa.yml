name: Daily QA Report

on:
  schedule:
    # Run at 7:00 AM every day (UTC = 3:00 AM EST)
    - cron: '0 7 * * *'
  workflow_dispatch:
    # Allow manual trigger

jobs:
  qa-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Run QA Tests
        run: node tests/e2e/qa-mobile.js

      - name: Upload QA Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-report-${{ github.run_number }}
          path: qa-report.log
          retention-days: 30

  deploy-if-needed:
    runs-on: ubuntu-latest
    needs: qa-test
    if: github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Deploy to Vercel
        run: npx vercel --prod --token ${{ secrets.VERCEL_TOKEN }} --project-name portraitpay --yes
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Notify Success
        if: success()
        run: echo "✅ Daily QA passed and deployment successful"

      - name: Notify Failure
        if: failure()
        run: echo "❌ Daily QA failed - manual review needed"
